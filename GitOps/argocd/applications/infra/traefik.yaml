apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
spec:
  project: sample-project
  source:
    repoURL: https://helm.traefik.io/traefik
    chart: traefik
    targetRevision: "30.x"
    helm:
      values: |
        service:
          type: ClusterIP
        ports:
          web:
            exposedPort: 80
          websecure:
            exposedPort: 443
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
