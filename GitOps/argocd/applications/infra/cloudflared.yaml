apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflared
  namespace: argocd
spec:
  project: sample
  source:
    repoURL: https://github.com/bug8499/IaC-GitOps-Vultr
    targetRevision: HEAD
    path: GitOps/apps/base/cloudflared
  destination:
    server: https://kubernetes.default.svc
    namespace: cloudflared
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true