apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: meme-website-prod
  namespace: argocd
spec:
  ignoreDifferences:
  - group: apps
    kind: Deployment
    jsonPointers:
    - /spec/replicas
  project: sample-project
  source:
    repoURL: https://github.com/bug8499/IaC-GitOps
    targetRevision: main
    path: GitOps/apps/overlays/prod/meme-website
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true