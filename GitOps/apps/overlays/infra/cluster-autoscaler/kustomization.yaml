apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../base/cluster-autoscaler
patches:
  - patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: cluster-autoscaler-config
        namespace: kube-system
      data:
        aws-region: "ap-southeast-1"
        cluster-name: "my-k3s-cluster"