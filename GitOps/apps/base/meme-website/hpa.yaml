apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: meme-website
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: meme-website
  minReplicas: 2        # เพิ่มจาก 1 → ไม่มี single point of failure
  maxReplicas: 20       # เพิ่มจาก 5 → รองรับ spike ได้
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 20   # ลดจาก 70 → scale เร็วขึ้น ก่อน overload
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70