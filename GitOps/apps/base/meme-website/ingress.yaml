apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: meme-website
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
  - host: placeholder.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: meme-website
            port:
              number: 80