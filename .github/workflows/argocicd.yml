name: Build and Deploy

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
        description: "ชื่อ service เช่น sample-app"
      environment:
        required: true
        type: string
        description: "dev หรือ prod"
      image_tag:
        required: true
        type: string
        description: "Docker image tag เช่น github.sha"
      # ลบ aws_region ออก ไม่ใช้แล้ว
      # ลบ ecr_alias ออก ไม่ใช้แล้ว
    secrets:
      # ลบ AWS_ACCESS_KEY_ID ออก
      # ลบ AWS_SECRET_ACCESS_KEY ออก
      GH_PAT:
        required: true

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout app source
        uses: actions/checkout@v4

      # ลบ step "Configure AWS credentials" ออกทั้งก้อน
      # ลบ step "Login to Amazon ECR Public" ออกทั้งก้อน

      # แก้ใหม่: Login เข้า GHCR แทน
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # มีอยู่แล้ว ไม่ต้องสร้างเพิ่ม

      # แก้ใหม่: Build และ Push ไป GHCR แทน ECR
      - name: Build and push Docker image
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          SERVICE: ${{ inputs.service_name }}
          OWNER: ${{ github.repository_owner }}
        run: |
          docker build -t ghcr.io/$OWNER/$SERVICE:$IMAGE_TAG .
          docker push ghcr.io/$OWNER/$SERVICE:$IMAGE_TAG

      - name: Checkout iac-ops repo
        uses: actions/checkout@v4
        with:
          repository: bug8499/IaC-GitOps
          token: ${{ secrets.GH_PAT }}
          path: iac-ops

      # แก้ใหม่: เปลี่ยน image URL ที่ส่งให้ kustomize
      - name: Update image tag in overlay
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          SERVICE: ${{ inputs.service_name }}
          ENV: ${{ inputs.environment }}
          OWNER: ${{ github.repository_owner }}
        run: |
          cd iac-ops/GitOps/apps/overlays/$ENV/$SERVICE
          kustomize edit set image $SERVICE=ghcr.io/$OWNER/$SERVICE:$IMAGE_TAG

      # ไม่ต้องแก้ — เหมือนเดิมทุกอย่าง
      - name: Commit and push image tag update
        env:
          ENV: ${{ inputs.environment }}
          SERVICE: ${{ inputs.service_name }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          cd iac-ops
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add GitOps/apps/overlays/$ENV/$SERVICE/kustomization.yaml
          git commit -m "deploy($ENV): update $SERVICE image tag to $IMAGE_TAG"
          git push